version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: carbon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carbon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carbon_password}
      POSTGRES_DB: ${POSTGRES_DB:-carbon_db}
      # Tune postgres for concurrent connections from multiple uvicorn workers
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c checkpoint_completion_target=0.9
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carbon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carbon-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carbon-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-carbon}:${POSTGRES_PASSWORD:-carbon_password}@postgres:5432/${POSTGRES_DB:-carbon_db}
      SECRET_KEY: ${SECRET_KEY:-test-secret-key-for-testing-only}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      HOST: 0.0.0.0
      PORT: 8000
      # 4 workers × async I/O handles 10+ concurrent users comfortably
      WORKERS: ${WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - carbon-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  carbon-network:
    driver: bridge
